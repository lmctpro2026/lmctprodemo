<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Ink ground -->
  <rect width="512" height="512" rx="112" fill="#0d1117"/>
  <!-- Heraldic gold ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#c8a96e" stroke-width="6" opacity="0.42"/>
  <!-- Sedan silhouette: bonnet → A-pillar → roofline → C-pillar → boot.
       Premium proportions — long bonnet, generous roof, short rear deck. -->
  <path d="M 88 304 L 136 304 Q 152 224 208 184 L 304 184 Q 360 224 376 304 L 424 304"
        fill="none" stroke="#c8a96e" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Body underline, broken at the wheel arches -->
  <line x1="88"  y1="304" x2="144" y2="304" stroke="#c8a96e" stroke-width="16" stroke-linecap="round"/>
  <line x1="208" y1="304" x2="304" y2="304" stroke="#c8a96e" stroke-width="16" stroke-linecap="round"/>
  <line x1="368" y1="304" x2="424" y2="304" stroke="#c8a96e" stroke-width="16" stroke-linecap="round"/>
  <!-- Wheels -->
  <circle cx="176" cy="336" r="28" fill="#0d1117" stroke="#c8a96e" stroke-width="14"/>
  <circle cx="336" cy="336" r="28" fill="#0d1117" stroke="#c8a96e" stroke-width="14"/>
</svg>
